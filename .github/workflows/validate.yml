name: Validate

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  yaml:
    name: Lint YAML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint==1.35.1

      - name: Run yamllint
        run: |
          yamllint -d '{extends: default, rules: {line-length: {max: 200}, document-start: disable}}' manifests/ .github/

  markdown:
    name: Lint Markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli@0.41.0

      - name: Run markdownlint
        run: markdownlint '**/*.md' --ignore node_modules --disable MD013 MD033 MD041
